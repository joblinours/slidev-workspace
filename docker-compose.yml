services:
  slidev-workspace:
    build: .
    ports:
      - "8084:8084"
    environment:
      # GitHub repo to clone (format: username/repo-name)
      - GITHUB_REPO=${GITHUB_REPO}
      # Optional: path within the repo that contains slide folders (leave empty for root)
      - GITHUB_PATH=${GITHUB_PATH:-}
      # Personal Access Token for private repos
      - GITHUB_PAT=${GITHUB_PAT}
      # Base URL — use / for direct access, /subpath/ when behind a reverse proxy
      - BASE_URL=${BASE_URL:-/}
      # Workspace title displayed in the UI
      - SLIDES_TITLE=${SLIDES_TITLE:-Mes Présentations}
    volumes:
      - slides-data:/workspace/slides
      - dist-data:/workspace/dist
    restart: unless-stopped

volumes:
  slides-data:
  dist-data:
