services:
  slidev-workspace:
    image: ghcr.io/joblinours/slidev-workspace:latest
    # Pour builder l'image localement à la place : commentez la ligne image et décommentez build
    # build: .
    ports:
      - "8084:8084"
    environment:
      # GitHub repo contenant vos présentations Slidev (format : username/repo-name)
      - GITHUB_REPO=${GITHUB_REPO}
      # Optionnel : sous-dossier dans le repo où se trouvent les slides (vide = racine)
      - GITHUB_PATH=${GITHUB_PATH:-}
      # Personal Access Token pour les repos privés (scope : repo read)
      - GITHUB_PAT=${GITHUB_PAT}
      # URL de base — utilisez / pour accès direct, /subpath/ derrière un reverse proxy
      # Derrière proxy.jobl1n0urs.work, le service est servi sous /slides/
      - BASE_URL=${BASE_URL:-/slides/}
      # Titre affiché dans l'interface
      - SLIDES_TITLE=${SLIDES_TITLE:-Mes Présentations}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - slides-data:/workspace/slides
      - dist-data:/workspace/dist
    restart: unless-stopped

volumes:
  slides-data:
  dist-data:
